<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Real Book Flip</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:#f3f3f3;
  font-family:sans-serif;
}

/* 책 */
.book{
  position:relative;
  width:100vw;
  height:100vh;
  perspective:5000px;
  overflow:hidden;
  background:white;
}

/* 중앙 접힘 */
.book::before{
  content:'';
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);

  width:14px;
  height:100%;

  background:linear-gradient(
    to right,
    rgba(0,0,0,0.08),
    rgba(255,255,255,0.95),
    rgba(0,0,0,0.08)
  );

  z-index:999;
  pointer-events:none;
}

/* 페이지 */
.page{
  position:absolute;

  width:50%;
  height:100%;

  right:0;
  top:0;

  background:white;

  transform-origin:left center;
  transform-style:preserve-3d;

  transition:transform 1.2s cubic-bezier(.65,0,.2,1);

  box-shadow:
    -2px 0 10px rgba(0,0,0,0.04);
}

/* 페이지 앞면 */
.page-front,
.page-back{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  background:white;

  backface-visibility:hidden;
}

/* 뒷면 */
.page-back{
  transform:rotateY(180deg);
}

/* 페이지 넘김 */
.page.flipped{
  transform:rotateY(-180deg);
}

/* 종이 그림자 */
.page::after{
  content:'';

  position:absolute;
  top:0;
  right:-18px;

  width:36px;
  height:100%;

  background:linear-gradient(
    to right,
    rgba(0,0,0,0.15),
    transparent
  );

  opacity:.4;

  transition:opacity 1.2s ease;
}

.page.flipped::after{
  opacity:.05;
}

/* 왼쪽 페이지 영역 */
.left{
  position:absolute;

  left:0;
  top:0;

  width:50%;
  height:100%;

  background:white;
}

/* 내용 */
.content{
  width:100%;
  height:100%;

  padding:70px;

  color:#222;
  line-height:1.8;
}

/* 버튼 */
.controls{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);

  display:flex;
  gap:14px;

  z-index:9999;
}

button{
  padding:12px 24px;

  border:none;
  border-radius:999px;

  background:#111;
  color:white;

  cursor:pointer;
  font-size:15px;
}
</style>
</head>

<body>

<div class="book" id="book">

  <!-- 왼쪽 기본 -->
  <div class="left"></div>

</div>

<div class="controls">
  <button id="prevBtn">이전</button>
  <button id="nextBtn">다음</button>
</div>

<script>
const pageData = [

  `
    <h1>PAGE 1</h1>
    <p>첫 페이지 내용입니다.</p>
  `,

  `
    <h1>PAGE 2</h1>
    <p>두번째 페이지 내용입니다.</p>
  `,

  `
    <h1>PAGE 3</h1>
    <p>세번째 페이지 내용입니다.</p>
  `,

  `
    <h1>PAGE 4</h1>
    <p>네번째 페이지 내용입니다.</p>
  `,

  `
    <h1>PAGE 5</h1>
    <p>다섯번째 페이지 내용입니다.</p>
  `,

  `
    <h1>PAGE 6</h1>
    <p>여섯번째 페이지 내용입니다.</p>
  `

];

const book = document.getElementById('book');

const pages = [];

for(let i = 0; i < pageData.length; i++){

  const page = document.createElement('div');

  page.classList.add('page');

  page.style.zIndex = pageData.length - i;

  page.innerHTML = `

    <div class="page-front">
      <div class="content">
        ${pageData[i]}
      </div>
    </div>

    <div class="page-back">
      <div class="content">
        ${
          pageData[i + 1]
          ? pageData[i + 1]
          : ''
        }
      </div>
    </div>

  `;

  book.appendChild(page);

  pages.push(page);
}

let current = 0;

/* 다음 */
document.getElementById('nextBtn').addEventListener('click', () => {

  if(current < pages.length){

    pages[current].classList.add('flipped');

    current++;
  }
});

/* 이전 */
document.getElementById('prevBtn').addEventListener('click', () => {

  if(current > 0){

    current--;

    pages[current].classList.remove('flipped');
  }
});
</script>

</body>
</html>
