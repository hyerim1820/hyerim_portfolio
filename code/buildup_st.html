<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Multi Page Book Flip</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* 책 전체 */
.book{
  position:relative;
  width:100vw;
  height:100vh;
  perspective:4000px;
  overflow:hidden;
  background:white;
}

/* 중앙 책 접힘 (간격 좁힘) */
.book::before{
  content:'';
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);
  width:18px;

  height:100%;

  background:linear-gradient(
    to right,
    rgba(0,0,0,0.08),
    rgba(255,255,255,0.95),
    rgba(0,0,0,0.08)
  );

  z-index:100;
  pointer-events:none;
}

/* 왼쪽 페이지 */
.left-page{
  position:absolute;
  left:0;
  top:0;

  width:50%;
  height:100%;

  background:white;
  overflow:hidden;
}

/* 페이지 */
.page{
  position:absolute;
  width:50%;
  height:100%;

  right:0;
  top:0;

  transform-origin:left center;
  transform-style:preserve-3d;

  transition:transform 1.4s cubic-bezier(.7,0,.2,1);

  cursor:pointer;
}

/* 페이지 넘김 */
.page.flipped{
  transform:rotateY(-180deg);
}

/* 페이지 앞뒤 */
.front,
.back{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  background:white;

  backface-visibility:hidden;
  overflow:hidden;
}

/* 앞면 */
.front{
  border-left:1px solid rgba(0,0,0,0.05);
}

/* 뒷면 */
.back{
  transform:rotateY(180deg);
}

/* 종이 그림자 */
.page::after{
  content:'';

  position:absolute;
  top:0;
  right:-15px;

  width:30px;
  height:100%;

  background:linear-gradient(
    to right,
    rgba(0,0,0,0.12),
    transparent
  );

  opacity:.45;
  transition:opacity 1.4s ease;
}

.page.flipped::after{
  opacity:.08;
}

/* 내용 */
.content{
  width:100%;
  height:100%;
  padding:70px;

  color:#222;
  line-height:1.7;
}

/* 버튼 */
.controls{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);

  display:flex;
  gap:12px;

  z-index:9999;
}

button{
  padding:12px 26px;

  border:none;
  border-radius:999px;

  background:#111;
  color:white;

  cursor:pointer;
  font-size:15px;

  transition:.25s;
}

button:hover{
  opacity:.9;
  transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="book" id="book">

  <!-- 왼쪽 고정 페이지 -->
  <div class="left-page">
    <div class="content" id="leftContent">
      <h1>PAGE 1</h1>
      <p>첫 페이지 내용</p>
    </div>
  </div>

</div>

<div class="controls">
  <button id="prevBtn">이전</button>
  <button id="nextBtn">다음</button>
</div>

<script>
const pages = [
  {
    front: `
      <h1>PAGE 2</h1>
      <p>두번째 페이지입니다.</p>
    `,
    back: `
      <h1>PAGE 3</h1>
      <p>세번째 페이지입니다.</p>
    `
  },

  {
    front: `
      <h1>PAGE 4</h1>
      <p>네번째 페이지입니다.</p>
    `,
    back: `
      <h1>PAGE 5</h1>
      <p>다섯번째 페이지입니다.</p>
    `
  },

  {
    front: `
      <h1>PAGE 6</h1>
      <p>여섯번째 페이지입니다.</p>
    `,
    back: `
      <h1>PAGE 7</h1>
      <p>일곱번째 페이지입니다.</p>
    `
  }
];

const book = document.getElementById('book');

let currentPage = 0;
let pageElements = [];

/* 페이지 생성 */
pages.forEach((pageData, index) => {

  const page = document.createElement('div');
  page.classList.add('page');

  page.style.zIndex = pages.length - index;

  page.innerHTML = `
    <div class="front">
      <div class="content">
        ${pageData.front}
      </div>
    </div>

    <div class="back">
      <div class="content">
        ${pageData.back}
      </div>
    </div>
  `;

  book.appendChild(page);

  pageElements.push(page);
});

/* 다음 */
document.getElementById('nextBtn').addEventListener('click', () => {

  if(currentPage < pageElements.length){

    pageElements[currentPage].classList.add('flipped');

    currentPage++;
  }
});

/* 이전 */
document.getElementById('prevBtn').addEventListener('click', () => {

  if(currentPage > 0){

    currentPage--;

    pageElements[currentPage].classList.remove('flipped');
  }
});
</script>

</body>
</html>
