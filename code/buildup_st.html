<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fullscreen Book Flip</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* 전체 책 */
.book{
  position:relative;
  width:100vw;
  height:100vh;
  perspective:3000px;
  overflow:hidden;
  background:white;
}

/* 페이지 공통 */
.page{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
}

/* 왼쪽 페이지 */
.left-side{
  position:absolute;
  inset:0;
  background:white;
  overflow:hidden;
}

/* 실제 넘어가는 종이 */
.paper{
  position:absolute;
  width:50%;
  height:100%;
  right:0;
  top:0;

  background:white;

  transform-origin:left center;
  transform-style:preserve-3d;

  transition:
    transform 1.4s cubic-bezier(.65,.02,.2,1),
    filter 1.4s ease,
    opacity 1.2s ease;

  z-index:5;
}

/* 종이 앞뒤 */
.front,
.back{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  background:white;

  backface-visibility:hidden;
  overflow:hidden;
}

/* 앞면 */
.front{
  border-left:1px solid rgba(0,0,0,0.08);
}

/* 뒷면 */
.back{
  transform:rotateY(180deg);
}

/* 종이 그림자 */
.paper::after{
  content:'';
  position:absolute;
  top:0;
  right:-30px;
  width:60px;
  height:100%;

  background:linear-gradient(
    to right,
    rgba(0,0,0,0.18),
    transparent
  );

  opacity:.45;
  transition:opacity 1.4s ease;
}

/* 넘겨질 때 */
.paper.flip{
  transform:rotateY(-180deg);
  filter:brightness(.98);
  opacity:.98;
}

.paper.flip::after{
  opacity:.08;
}

/* 중앙 접힘 */
.book::before{
  content:'';
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);
  width:70px;
  height:100%;

  background:linear-gradient(
    to right,
    rgba(0,0,0,0.12),
    rgba(255,255,255,0.6),
    rgba(0,0,0,0.12)
  );

  z-index:10;
  pointer-events:none;
}

/* 내용 넣는 영역 */
.content{
  width:100%;
  height:100%;
  padding:80px;
  color:#222;
  line-height:1.7;
}

/* 버튼 */
.controls{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:16px;
  z-index:999;
}

button{
  padding:14px 28px;
  border:none;
  border-radius:999px;

  background:#111;
  color:white;

  font-size:16px;
  cursor:pointer;

  transition:.25s;
}

button:hover{
  transform:translateY(-2px);
  opacity:.9;
}
</style>
</head>

<body>

<div class="book">

  <!-- 왼쪽 페이지 -->
  <div class="left-side">
    <div class="content">
      <h1>왼쪽 페이지</h1>
      <p>
        여기에 원하는 내용을 자유롭게 넣으면 됩니다.
      </p>
    </div>
  </div>

  <!-- 넘어가는 페이지 -->
  <div class="page">
    <div class="paper" id="paper">

      <!-- 앞면 -->
      <div class="front">
        <div class="content">
          <h1>오른쪽 페이지</h1>
          <p>
            이 부분도 원하는 HTML 내용으로 교체 가능합니다.
          </p>
        </div>
      </div>

      <!-- 뒷면 -->
      <div class="back">
        <div class="content">
          <h1>다음 페이지</h1>
          <p>
            책장이 넘어간 뒤 보이는 페이지입니다.
          </p>
        </div>
      </div>

    </div>
  </div>

</div>

<div class="controls">
  <button id="prev">이전</button>
  <button id="next">다음</button>
</div>

<script>
const paper = document.getElementById('paper');

document.getElementById('next').addEventListener('click', () => {
  paper.classList.add('flip');
});

document.getElementById('prev').addEventListener('click', () => {
  paper.classList.remove('flip');
});

/* 화면 클릭으로 넘기기 */
document.addEventListener('click', (e) => {

  if(e.target.tagName === 'BUTTON') return;

  paper.classList.toggle('flip');
});
</script>

</body>
</html>
